name: Scrape Datanomics Amazon

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

jobs:
  scrape-amazon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r datanomics/requirements.txt

      - name: Verify Chrome and ChromeDriver
        run: |
          google-chrome --version
          chromedriver --version

      - name: Ensure output file exists
        run: |
          mkdir -p datanomics/outputs
          mkdir -p datanomics/state
          touch datanomics/outputs/amazon_offers.csv

      - name: Run scraper for Apple
        run: python datanomics/src/run.py --config datanomics/configs/apple.json

      - name: Run scraper for Samsung
        run: python datanomics/src/run.py --config datanomics/configs/samsung.json

      - name: Run scraper for Xiaomi
        run: python datanomics/src/run.py --config datanomics/configs/xiaomi.json

      - name: Run scraper for Huawei
        run: python datanomics/src/run.py --config datanomics/configs/huawei.json

      - name: Commit updated outputs and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datanomics/outputs/amazon_offers.csv
          git add datanomics/state/*.json || true
          git diff --cached --quiet || git commit -m "Update Amazon tracker"
          git push
